name: PanBar
options:
  bundleIdPrefix: app.panbar
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    PRODUCT_NAME: PanBar
    INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 PanBar contributors"
    COMBINE_HIDPI_IMAGES: YES
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  PanBar:
    type: application
    platform: macOS
    sources:
      - path: PanBar
        excludes:
          - "**/.DS_Store"
    resources:
      - path: PanBar/Resources
    info:
      path: PanBar/Resources/Info.plist
      properties:
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.finance
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: PanBar
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleLocalizations:
          - zh-Hans
          - en
        CFBundleDevelopmentRegion: zh-Hans
        SUFeedURL: https://tnt-likely.github.io/PanBar/appcast.xml
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
        SUPublicEDKey: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.panbar.PanBar
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_PREVIEWS: YES
        # 默认版本号。CI 通过 `xcodebuild MARKETING_VERSION=x.y.z CURRENT_PROJECT_VERSION=NNN` 覆盖。
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Debug:
          # Debug 走无沙盒 entitlements,Sparkle 不需要 Hardened Runtime 也能加载 XPC
          CODE_SIGN_ENTITLEMENTS: PanBar/Resources/PanBar-Debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: PanBar/Resources/PanBar.entitlements
    dependencies:
      - package: GRDB
      - package: Sparkle

schemes:
  PanBar:
    build:
      targets:
        PanBar: all
    run:
      config: Debug
    archive:
      config: Release
